name: Build APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: ArtemSBulgakov/buildozer-action@v1
      with:
        command: buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
